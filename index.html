<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Three.js Lithium Atom</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: white; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        const atomGroup = new THREE.Group();
        atomGroup.position.set(0, 2, 0);
        scene.add(atomGroup);

        const textureLoader = new THREE.TextureLoader();
        const waterTexture = textureLoader.load('waternormals.jpg');

        const nucleusGeo = new THREE.SphereGeometry(0.7, 32, 32);
        const nucleusMat = new THREE.MeshStandardMaterial({ 
            color: 0xff0000,
            map: waterTexture
        });
        const nucleus = new THREE.Mesh(nucleusGeo, nucleusMat);
        atomGroup.add(nucleus);

        const torusGeo = new THREE.TorusGeometry(5, 0.03, 8, 128);
        const torusMat = new THREE.MeshBasicMaterial({ 
            color: 0x000000, 
            transparent: true, 
            opacity: 0.6 
        });

        const electrons = [];

        function createOrbit(rotationZDeg, animDurationMs, electronColor, electronRadius) {
            const orbitEntity = new THREE.Group();
            orbitEntity.rotation.z = THREE.MathUtils.degToRad(rotationZDeg);
            atomGroup.add(orbitEntity);

            const torus = new THREE.Mesh(torusGeo, torusMat);
            torus.scale.set(0.38, 1, 1);
            orbitEntity.add(torus);

            const electronPivot = new THREE.Group();
            torus.add(electronPivot);

            const electronGeo = new THREE.SphereGeometry(electronRadius, 12, 12);
            const electronMat = new THREE.MeshStandardMaterial({ color: electronColor });
            const electron = new THREE.Mesh(electronGeo, electronMat);
            electron.position.set(5, 0, 0);
            electronPivot.add(electron);

            const speed = (Math.PI * 2) / (animDurationMs / 1000);
            
            electrons.push({
                pivot: electronPivot,
                speed: speed
            });
        }

        createOrbit(0, 4100, 0xf54242, 0.18);
        createOrbit(60, 5800, 0x4287f5, 0.18);
        createOrbit(120, 7500, 0x5cd65c, 0.18);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();

            electrons.forEach(el => {
                el.pivot.rotation.z += el.speed * delta;
            });

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
